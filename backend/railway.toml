[phases.setup]
# Install PHP, Composer, Node (for building React)
nixPkgs = [
  "php82",
  "php82Extensions.pdo",
  "php82Extensions.pdo_mysql",
  "phpPackages.composer",
  "nodejs_20"
]

[phases.install]
# Laravel will use composer install in build phase, so skip default install
cmds = ["echo 'Skipping default install'"]

[phases.build]
cmds = [
  # Clean up old vendor/cache
  "rm -rf vendor bootstrap/cache/*.php composer.lock",
  # Install Laravel dependencies
  "composer install --no-dev --optimize-autoloader --no-interaction",
  # Build React (from /frontend folder)
  "cd ../frontend && npm ci && npm run build",
  # Copy built React files into Laravel's public folder
  "cp -r ../frontend/build/* public/",
  # Clear and cache Laravel configs
  "php artisan config:clear",
  "php artisan cache:clear",
  "php artisan config:cache"
]

[start]
# Start Laravel using artisan serve (loads .env properly)
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
