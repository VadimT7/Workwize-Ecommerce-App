[phases.setup]
# Install PHP, Composer, Node (for building React)
nixPkgs = [
  "php82",
  "php82Extensions.pdo",
  "php82Extensions.pdo_mysql",
  "phpPackages.composer",
  "nodejs_20"
]

[phases.install]
# Laravel will use composer install in build phase, so skip default install
cmds = ["echo 'Skipping default install'"]

[phases.build]
cmds = [
  "rm -rf vendor bootstrap/cache/*.php composer.lock",
  "composer install --no-dev --optimize-autoloader --no-interaction",
  # ✅ Build Vite app
  "cd ../frontend && npm ci && npm run build",
  # ✅ Copy from dist (not build!)
  "mkdir -p public",
  "cp -r ../frontend/dist/* public/",
  "php artisan config:clear",
  "php artisan cache:clear",
  "php artisan config:cache"
]

[start]
# Start Laravel using artisan serve (loads .env properly)
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
